# Default active profile
spring.profiles.active=dev

# Config location for YAML (ensuring it's picked up)
spring.config.import=optional:file:./src/main/resources/yaml/

# GraphQL Configuration - DISABLE built-in (using CDN HTML)
spring.graphql.graphiql.enabled=false
spring.graphql.path=/graphql

# Database Configuration (Defaults in case YAML is missing)
spring.datasource.url=jdbc:h2:mem:ecommerce_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Server
server.port=8080